{% extends 'base.html' %}
{% load static %}

{% block title %}Пароль змінено - AutoTech Pro{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center py-12 px-4">
    <div class="glass-panel rounded-[32px] p-8 max-w-md w-full text-center">
        <div class="w-16 h-16 rounded-full bg-green-500/20 flex items-center justify-center mx-auto mb-4">
            <i data-lucide="check-circle" class="w-8 h-8 text-green-500"></i>
        </div>
        
        <h2 class="text-2xl font-bold text-white mb-4">Пароль змінено</h2>
        
        <p class="text-gray-400 mb-6">
            Ваш пароль було успішно змінено. Тепер ви можете увійти з новим паролем.
        </p>
        
        <a href="{% url 'account_login' %}" class="btn-cyber inline-flex">
            <i data-lucide="log-in" class="w-4 h-4 mr-2"></i>Увійти
        </a>
    </div>
</div>

<script>
    lucide.createIcons();
</script>
{% endblock %}
